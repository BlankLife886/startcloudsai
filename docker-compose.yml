services:
  postgres:
    image: postgres:17-alpine@sha256:742f40ea20b9ff2ff31db5458d127452988a2164df9e17441e191f3b72252193
    restart: unless-stopped
    environment:
      POSTGRES_USER: starclouds
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: starclouds
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U starclouds"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [data]
    mem_limit: 1g
    cpus: 1.0
    pids_limit: 200

  redis:
    image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD must be set}"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" --no-auth-warning ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    networks: [data]
    mem_limit: 512m
    cpus: 0.5
    pids_limit: 100

  server:
    build: ./apps/server
    restart: unless-stopped
    env_file: ${APP_ENV_FILE:-.env}
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set}@redis:6379/0
      SUB2API_BASE_URL: ${SUB2API_BASE_URL:-http://host.docker.internal:8080}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["/app/server", "serve"]
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks: [data, api, outbound]
    mem_limit: 1g
    cpus: 1.0
    pids_limit: 200
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8000/api/health"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 15s

  worker:
    build: ./apps/server
    restart: unless-stopped
    env_file: ${APP_ENV_FILE:-.env}
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set}@redis:6379/0
    depends_on:
      # server 健康 = 数据库迁移已完成，避免 worker 抢跑
      server:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["/app/server", "worker"]
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks: [data, outbound]
    mem_limit: 2g
    cpus: 2.0
    pids_limit: 300

  web:
    build: ./apps/web
    restart: unless-stopped
    networks: [frontend]
    mem_limit: 256m
    cpus: 0.5
    pids_limit: 100

  admin:
    build: ./apps/admin
    restart: unless-stopped
    networks: [frontend]
    mem_limit: 256m
    cpus: 0.5
    pids_limit: 100

  gateway:
    image: nginx:1.27-alpine@sha256:65645c7bb6a0661892a8b03b89d0743208a18dd2f3f17a54ef4b76fb8e2f2a10
    restart: unless-stopped
    ports:
      - "${GATEWAY_BIND:-127.0.0.1}:${GATEWAY_PORT:-8080}:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      server:
        condition: service_healthy
      web:
        condition: service_started
      admin:
        condition: service_started
    networks:
      api:
        ipv4_address: 172.30.10.254
      frontend: {}
      edge: {}
    mem_limit: 256m
    cpus: 0.5
    pids_limit: 100

volumes:
  pg_data:
  redis_data:

networks:
  data:
    internal: true
  api:
    internal: true
    ipam:
      config:
        - subnet: 172.30.10.0/24
  frontend:
    internal: true
  outbound:
  edge:
