# 管理后台静态站：挂在 /admin/ 子路径下，SPA history 路由 fallback 到 index.html。
# 外层 gateway 必须原样转发（proxy_pass 不带 URI 部分），保留 /admin/ 前缀。
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    location = /admin {
        return 301 /admin/;
    }

    location = /admin/index.html {
        add_header Cache-Control "no-store";
        expires -1;
    }

    # 静态资源带 hash，可长缓存
    location /admin/assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback：深链（/admin/users 等）与刷新都回 index.html。
    # 用 root + try_files（dist 放在 html/admin/），避免 alias + try_files 的经典失效问题。
    location /admin/ {
		add_header Cache-Control "no-cache";
        index index.html;
        try_files $uri $uri/ /admin/index.html;
    }
}
