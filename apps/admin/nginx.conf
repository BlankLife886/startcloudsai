# 管理后台静态站：挂在 /admin/ 子路径下，SPA history 路由 fallback 到 index.html。
# 通常由外层 nginx gateway 将 /admin/ 转发到本容器。
server {
    listen 80;
    server_name _;

    location = /admin {
        return 301 /admin/;
    }

    location /admin/ {
        alias /usr/share/nginx/html/admin/;
        index index.html;
        try_files $uri $uri/ /admin/index.html;
    }

    # 静态资源带 hash，可长缓存
    location /admin/assets/ {
        alias /usr/share/nginx/html/admin/assets/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
