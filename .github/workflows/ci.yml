name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  server:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine@sha256:742f40ea20b9ff2ff31db5458d127452988a2164df9e17441e191f3b72252193
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: apps/server/go.mod
          cache-dependency-path: apps/server/go.sum
      - name: Vet
        working-directory: apps/server
        run: go vet ./...
      - name: Test
        working-directory: apps/server
        env:
          TEST_DATABASE_URL: postgres://ci:ci@localhost:5432/postgres?sslmode=disable
        run: go test ./...
      - name: Vulnerability scan
        working-directory: apps/server
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.1.4 ./...
      - name: Security static analysis
        working-directory: apps/server
        run: go run github.com/securego/gosec/v2/cmd/gosec@v2.22.10 ./...

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install
        working-directory: apps/web
        run: npm ci --no-audit --no-fund
      - name: Check imports
        working-directory: apps/web
        run: node scripts/check-imports.mjs
      - name: Lint
        working-directory: apps/web
        run: npm run lint
      - name: Build
        working-directory: apps/web
        run: npm run build
      - name: Dependency audit
        working-directory: apps/web
        run: npm audit --audit-level=high

  admin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/admin/package-lock.json
      - name: Install
        working-directory: apps/admin
        run: npm ci --no-audit --no-fund
      - name: Build (含 vue-tsc strict)
        working-directory: apps/admin
        run: npm run build
      - name: Dependency audit
        working-directory: apps/admin
        run: npm audit --audit-level=high

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Secret scan
        run: go run github.com/zricethezav/gitleaks/v8@v8.27.2 detect --no-banner --redact --config .gitleaks.toml
      - name: Filesystem and dependency scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'
