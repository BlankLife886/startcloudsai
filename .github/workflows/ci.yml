name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  server:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/server/go.mod
          cache-dependency-path: apps/server/go.sum
      - name: Vet
        working-directory: apps/server
        run: go vet ./...
      - name: Test
        working-directory: apps/server
        env:
          TEST_DATABASE_URL: postgres://ci:ci@localhost:5432/postgres?sslmode=disable
        run: go test ./...

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install
        working-directory: apps/web
        run: npm ci --no-audit --no-fund
      - name: Check imports
        working-directory: apps/web
        run: node scripts/check-imports.mjs
      - name: Lint
        working-directory: apps/web
        run: npm run lint
      - name: Build
        working-directory: apps/web
        run: npm run build

  admin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/admin/package-lock.json
      - name: Install
        working-directory: apps/admin
        run: npm ci --no-audit --no-fund
      - name: Build (含 vue-tsc strict)
        working-directory: apps/admin
        run: npm run build
