map $http_x_forwarded_proto $upstream_scheme {
    default $scheme;
    https https;
}

map $http_x_forwarded_proto $hsts_header {
    default "";
    https "max-age=31536000; includeSubDomains";
}

server {
    listen 80;
    server_name _;
    client_max_body_size 1m;
    server_tokens off;

    # Docker 会在容器重建后分配新 IP。通过内置 DNS 按请求解析服务名，
    # 避免 gateway 继续把流量发往 web/admin/server 的旧容器地址。
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $server_upstream http://server:8000;
    set $admin_upstream http://admin:80;
    set $web_upstream http://web:80;

    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob: https:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; font-src 'self' data:; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'" always;
    add_header Strict-Transport-Security $hsts_header always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;

    location /api/ {
        proxy_pass $server_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $upstream_scheme;
        proxy_read_timeout 300s;
    }

    location = /api/assistant/images {
        client_max_body_size 20m;
        proxy_pass $server_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $upstream_scheme;
        proxy_read_timeout 300s;
    }

    location = /api/assistant/chat {
        client_max_body_size 20m;
        proxy_pass $server_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $upstream_scheme;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    location = /api/uploads {
        client_max_body_size 16m;
        proxy_pass $server_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $upstream_scheme;
        proxy_read_timeout 300s;
    }

    location = /admin {
        return 301 /admin/;
    }

    # 注意：proxy_pass 不带 URI（无尾斜杠），原样保留 /admin/ 前缀转发给 admin 容器
    location /admin/ {
        proxy_pass $admin_upstream;
    }

    location / {
        proxy_pass $web_upstream;
    }
}
